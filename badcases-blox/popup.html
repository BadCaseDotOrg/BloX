<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DevTools Popup</title>
<link rel="stylesheet" href="popup.css">
</head>
<body>
<div class="header-container">
  <img id="header-img" src="img/banner.png" alt="Arcade Header">
</div>
<div class="toggle-container">
  <span class="toggle-label">Show BloX Panel</span>
  <label class="toggle-switch">
    <input type="checkbox" id="injectToggle">
    <span class="slider"></span>
  </label>
</div>
<div class="button-container">
  <button id="openTrophyRoomBtn">Open Trophy Room</button>
</div>
<script src="popup.js"></script>
</body>
</html>

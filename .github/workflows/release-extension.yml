name: Build, Sign & Release BloX Chrome Extension

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Tag or version for this release (e.g., v1.0.0)'
        required: true
        default: 'v1.0.0'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      # 1️⃣ Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2️⃣ Create ZIP artifact
      - name: Create ZIP artifact
        run: |
          cd badcases-blox || true
          zip -r ../blox-${{ github.event.inputs.release_tag }}.zip . \
            -x "*.git*" ".github/*"

      # 3️⃣ Pack & sign CRX using inline key
      - name: Pack and sign CRX
        uses: cardinalby/webext-buildtools-chrome-crx-action@v2
        with:
          zipFilePath: blox-${{ github.event.inputs.release_tag }}.zip
          crxFilePath: blox-${{ github.event.inputs.release_tag }}.crx

name: Build, Sign & Release BloX Chrome Extension

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      # Checkout repo
      - name: Checkout code
        uses: actions/checkout@v4

      # Create ZIP from extension files
      - name: Create ZIP artifact
        run: |
          # If your extension is inside a folder, keep this:
          cd badcases-blox

          zip -r ../blox-${{ github.ref_name }}.zip . \
            -x "*.git*" ".github/*"

      # Pack & sign CRX (uses base64 private key secret)
      - name: Pack and sign CRX
        uses: cardinalby/webext-buildtools-chrome-crx-action@v2
        with:
          zipFilePath: blox-${{ github.ref_name }}.zip
          crxFilePath: blox-${{ github.ref_name }}.crx
          privateKey: ${{ secrets.CRX_PRIVATE_KEY_BASE64 }}

      # Create GitHub Release
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            blox-${{ github.ref_name }}.zip
            blox-${{ github.ref_name }}.crx
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') }}
          body: |
            **BloX v${{ github.ref_name }} Release**

            - ZIP: Upload to Chrome Web Store or load unpacked
            - CRX: Drag-and-drop install (Developer Mode required)

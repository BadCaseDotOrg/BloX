name: Build, Sign & Release BloX Chrome Extension

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Tag or version for this release (e.g., v1.0.0)'
        required: true
        default: 'v1.0.0'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      # 1️⃣ Checkout repo
      - name: Checkout code
        uses: actions/checkout@v4

      # 2️⃣ Create ZIP artifact
      - name: Create ZIP artifact
        run: |
          # Adjust folder if your extension is inside a subfolder
          cd badcases-blox || true
          zip -r ../blox-${{ github.event.inputs.release_tag }}.zip . \
            -x "*.git*" ".github/*"

      # 3️⃣ Reconstruct PEM key from secret (preserves line breaks)
      - name: Reconstruct private key
        run: |
          printf "%s" "${{ secrets.CRX_PRIVATE_KEY_BASE64 }}" > private.pem

      # 4️⃣ Pack & sign CRX using the reconstructed key
      - name: Pack and sign CRX
        uses: cardinalby/webext-buildtools-chrome-crx-action@v2
        with:
          zipFilePath: blox-${{ github.event.inputs.release_tag }}.zip
          crxFilePath: blox-${{ github.event.inputs.release_tag }}.crx
          privateKeyPath: private.pem

      # 5️⃣ Create GitHub Release
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag }}
          files: |
            blox-${{ github.event.inputs.release_tag }}.zip
            blox-${{ github.event.inputs.release_tag }}.crx
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.event.inputs.release_tag, 'beta') || contains(github.event.inputs.release_tag, 'alpha') }}
          body: |
            **BloX ${{ github.event.inputs.release_tag }} Release**

            - ZIP: For Chrome Web Store submission or "Load unpacked"
            - CRX: Drag-and-drop install (Developer Mode required)
